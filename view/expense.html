<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="expense.css">
</head>

<body>

    <div class="top-bar">

        <div class="logo-section">
            <h1>Expense Tracker</h1>
        </div>

        <div class="top-right">

            <button id="premiumBtn" class="premium-btn">
                Activate Premium ₹99
            </button>

            <button id="profileBtn" class="profile-btn">
                S
            </button>

        </div>

    </div>

    <!-- Modal -->
    <div id="profileModal" class="modal">

        <div class="modal-content">

            <span id="closeModal" class="close-btn">&times;</span>

            <h2>Your Profile</h2>
            <p class="user-info">
                <strong>Name:</strong>
                <span id="modalName"></span>
            </p>

            <p class="user-info">
                <strong>Email:</strong>
                <span id="modalEmail"></span>
            </p>
             <p class="user-info">
                <strong>Balance:</strong>
                <span id="modalBalance"></span>
            </p>
            <button id="logoutBtn" class="logout-btn">
                Logout
            </button>

        </div>

    </div>

    <!-- Premium Features -->
    <div id="premiumFeatures" style="display:none;">

        <div class="premium-wrapper">

            <!-- Leaderboard -->
            <div class="premium-section">

                <h2>🏆 Leaderboard</h2>

                <div id="leaderBoard">

                    <table class="leaderboard-table">

                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Name</th>
                                <th>Balance</th>
                                <th>Spent Money</th>
                            </tr>
                        </thead>

                        <tbody id="leaderBoardBody">

                        </tbody>

                    </table>

                </div>

            </div>

            <!-- AI Assistant -->
            <div class="premium-section">

                <h2>🤖 AI Expense Assistant</h2>

                <div class="ai-container">

                    <input type="text" id="aiQuestion" placeholder="Ask anything about your expenses..." />

                    <button id="askAiBtn">
                        Ask AI
                    </button>

                </div>

                <div id="aiResponse"></div>

            </div>

        </div>

    </div>
    <div class="expense-page">

        <div class="expense-form-container">

            <form class="expense-form">

                <h2>Add Expense</h2>

                <div class="expense-input-group">
                    <label for="money">Spent Money</label>
                    <input type="number" id="money" required />
                </div>

                <div class="expense-input-group">
                    <label for="desc">Description</label>
                    <input type="text" id="desc" />
                </div>

                <div class="expense-input-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" required />
                </div>

                <button type="submit" class="add-expense-btn">
                    Add Expense
                </button>

            </form>

        </div>

        <div class="expense-list-container">

            <h2>Expense History</h2>

            <div id="expenseList"></div>

        </div>

    </div>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./expense.js"></script>

</body>

</html>
